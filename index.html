<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Skull Bier — Sistema Unificado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #0f0e0d;
  --surface: #1a1917;
  --surface2: #222120;
  --surface3: #2a2926;
  --amber: #e8a020;
  --amber-dim: rgba(232,160,32,0.15);
  --amber-dim2: rgba(232,160,32,0.08);
  --red: #e05555;
  --red-dim: rgba(224,85,85,0.15);
  --green: #4caf6f;
  --green-dim: rgba(76,175,111,0.15);
  --yellow: #f0c040;
  --yellow-dim: rgba(240,192,64,0.15);
  --text: #f0ede8;
  --text-muted: #8a8780;
  --border: #2e2c2a;
  --radius: 8px;
  --radius-sm: 5px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

/* TELAS */
.view-panel { display: none; }
.view-panel.active { display: block; }

/* TELA LOGIN / CADASTRO */
.auth-container { max-width: 360px; margin: 80px auto padding: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); text-align: center; }
.auth-title { font-family: 'Bebas Neue', cursive; font-size: 32px; color: var(--amber); margin-bottom: 20px; }
.auth-input { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); margin-bottom: 12px; outline: none; }
.auth-input:focus { border-color: var(--amber); }
.auth-btn { width: 100%; padding: 12px; background: var(--amber); color: #000; border: none; border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; margin-bottom: 10px; }
.auth-toggle { font-size: 13px; color: var(--text-muted); cursor: pointer; text-decoration: underline; }

/* HUB PRINCIPAL */
.hub-header { padding: 20px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; justify-content: space-between; align-items: center; }
.hub-logo { font-family: 'Bebas Neue', cursive; font-size: 26px; color: var(--amber); }
.btn-logout { background: transparent; color: var(--red); border: 1px solid var(--red); padding: 5px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; }
.hub-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 24px; max-width: 600px; margin: 0 auto; }
@media(min-width: 600px) { .hub-grid { grid-template-columns: repeat(3, 1fr); } }
.hub-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.hub-card:hover { border-color: var(--amber); background: var(--surface2); }
.hub-icon { font-size: 36px; }
.hub-card-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 0.5px; color: var(--text); }

/* VOLTAR PRO HUB BAR */
.nav-top-bar { background: var(--surface2); padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.btn-back { background: var(--surface3); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; }

/* CONFIGS ESPECÍFICAS DE APP CLONADOS */
.app-frame { width: 100%; min-height: calc(100vh - 50px); padding: 16px; }
.search-input { width: 100%; padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); margin-bottom: 12px; }
.cat-header { font-family: 'Bebas Neue', sans-serif; color: var(--amber); font-size: 18px; margin: 14px 0 6px; border-bottom: 1px solid var(--border); padding-bottom: 2px; }
.item-row { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 10px; margin-bottom: 6px; border-radius: var(--radius); border-left: 3px solid transparent; }
.counter-ctrl { display: flex; align-items: center; gap: 8px; }
.btn-adj { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; }
.btn-minus { background: var(--red-dim); color: var(--red); }
.btn-plus { background: var(--green-dim); color: var(--green); }
.qty-display { font-family: 'DM Mono', monospace; font-size: 16px; min-width: 30px; text-align: center; }

/* ANALYTICS */
.analytics-dashboard { max-width: 800px; margin: 0 auto; padding: 16px; }
.status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-box { background: var(--surface); padding: 12px; border-radius: var(--radius); text-align: center; border: 1px solid var(--border); }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 28px; }
.stat-val.ok { color: var(--green); }
.stat-val.low { color: var(--yellow); }
.stat-val.crit { color: var(--red); }
.stat-lbl { font-size: 11px; color: var(--text-muted); }
</style>
</head>
<body>

<div id="view-auth" class="view-panel active">
  <div class="auth-container">
    <h2 class="auth-title" id="auth-header-title">LOGIN</h2>
    <input type="text" id="auth-user" class="auth-input" placeholder="Usuário">
    <input type="password" id="auth-pass" class="auth-input" placeholder="Senha">
    <button class="auth-btn" id="btn-auth-submit" onclick="handleAuth()">Entrar</button>
    <span class="auth-toggle" id="auth-toggle-mode" onclick="toggleAuthMode()">Não tem conta? Cadastre-se</span>
  </div>
</div>

<div id="view-hub" class="view-panel">
  <div class="hub-header">
    <div class="hub-logo">Black Skull Bier <span>Dashboard</span></div>
    <button class="btn-logout" onclick="logout()">Sair</button>
  </div>
  <div class="hub-grid">
    <div class="hub-card" onclick="openApp('cervejas')">
      <div class="hub-icon">🍺</div>
      <div class="hub-card-title">Cervejas</div>
    </div>
    <div class="hub-card" onclick="openApp('bebidas')">
      <div class="hub-icon">🍸</div>
      <div class="hub-card-title">Bebidas</div>
    </div>
    <div class="hub-card" onclick="openApp('contador-9')">
      <div class="hub-icon">📊</div>
      <div class="hub-card-title">Contador 9</div>
    </div>
    <div class="hub-card" onclick="openApp('extra')">
      <div class="hub-icon">📦</div>
      <div class="hub-card-title">Estoque Extra</div>
    </div>
    <div class="hub-card" onclick="openApp('analytics')" style="grid-column: span 2; border-color: var(--amber);">
      <div class="hub-icon">📈</div>
      <div class="hub-card-title" style="color: var(--amber);">Analytics Consolidado</div>
    </div>
  </div>
</div>

<div id="view-app" class="view-panel">
  <div class="nav-top-bar">
    <button class="btn-back" onclick="backToHub()">⬅ Voltar ao Menu</button>
    <h3 id="current-app-title" style="font-family: 'Bebas Neue'; letter-spacing: 1px;">App</h3>
  </div>
  <div class="app-frame" id="app-dynamic-content">
    </div>
</div>


<script>
// Configuração das chaves fornecidas
const SUPABASE_URL = "https://zanyxygplgrzxgqmzzga.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inphbnl4eWdwbGdyenhncW16emdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1Mzc3MTgsImV4cCI6MjA5NzExMzcxOH0.p9SGdxn1TljSEo2ZahSU1PLupRY7TzSI7HD4GKlxROA";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let isRegisterMode = false;
let currentApp = '';
let currentWeek = 'Semana 1';

// MOCK DE CATEGORIAS EXTRAÍDAS DO SEU SCHEMA ORIGINAL DOS TRÊS APPS
const DATA_SCHEMAS = {
  cervejas: [
    { nome: "Chops e Cervejas", itens: [{id:"c1", nome:"Chopp Black Skull Pilsen"}, {id:"c2", nome:"Cerveja IPA Garrafa"}] }
  ],
  bebidas: [
    { nome: "Destilados e Coquetéis", itens: [{id:"b1", nome:"Vodka Premium"}, {id:"b2", nome:"Gin Black Skull"}] }
  ],
  "contador-9": [
    { nome: "Categoria Padrão 9", itens: [{id:"cnt1", nome:"Insumo A"}, {id:"cnt2", nome:"Insumo B"}] }
  ],
  extra: [
    { nome: "Outros Almoxarifado", itens: [{id:"ex1", nome:"Copos Descartáveis"}, {id:"ex2", nome:"Guardanapos"}] }
  ]
};

// Objeto em memória para controlar os estados atuais de quantidades e mínimos
let localStocks = {}; 
let localMinimums = { "c1": 10, "c2": 5, "b1": 4, "b2": 6, "cnt1": 20, "cnt2": 15, "ex1": 50, "ex2": 100 };

// --- MECANISMO DE LOGIN SEM EMAIL ---
function toggleAuthMode() {
  isRegisterMode = !isRegisterMode;
  document.getElementById('auth-header-title').innerText = isRegisterMode ? "CADASTRO" : "LOGIN";
  document.getElementById('btn-auth-submit').innerText = isRegisterMode ? "Cadastrar" : "Entrar";
  document.getElementById('auth-toggle-mode').innerText = isRegisterMode ? "Já tem conta? Faça Login" : "Não tem conta? Cadastre-se";
}

async function handleAuth() {
  const user = document.getElementById('auth-user').value.trim();
  const pass = document.getElementById('auth-pass').value.trim();

  if(!user || !pass) return alert("Preencha todos os campos!");

  if(isRegisterMode) {
    // Cadastrar
    const { data: existing } = await supabase.from('app_users').select('username').eq('username', user).maybeSingle();
    if(existing) return alert("Este usuário já existe!");

    const { error } = await supabase.from('app_users').insert([{ username: user, password_hash: pass }]);
    if(error) return alert("Erro ao cadastrar: " + error.message);
    alert("Cadastro realizado com sucesso! Faça login.");
    toggleAuthMode();
  } else {
    // Login
    const { data, error } = await supabase.from('app_users').select('*').eq('username', user).eq('password_hash', pass).maybeSingle();
    if(error || !data) return alert("Usuário ou senha incorretos!");
    
    // Sucesso
    document.getElementById('view-auth').classList.remove('active');
    document.getElementById('view-hub').classList.add('active');
    await loadGlobalDataFromSupabase();
  }
}

function logout() {
  document.getElementById('view-hub').classList.remove('active');
  document.getElementById('view-app').classList.remove('active');
  document.getElementById('view-auth').classList.add('active');
}

// --- INTEGRAÇÃO DE DADOS ---
async function loadGlobalDataFromSupabase() {
  const { data, error } = await supabase.from('inventory_records').select('*');
  if(!error && data) {
    data.forEach(rec => {
      if(!localStocks[rec.app_type]) localStocks[rec.app_type] = {};
      if(!localStocks[rec.app_type][rec.week_label]) localStocks[rec.app_type][rec.week_label] = {};
      localStocks[rec.app_type][rec.week_label][rec.item_id] = rec.qty;
      localMinimums[rec.item_id] = rec.min_qty;
    });
  }
}

async function saveItemQty(app, week, itemId, itemName, catName, qty) {
  if(!localStocks[app]) localStocks[app] = {};
  if(!localStocks[app][week]) localStocks[app][week] = {};
  localStocks[app][week][itemId] = qty;

  const min = localMinimums[itemId] || 0;

  await supabase.from('inventory_records').upsert({
    app_type: app,
    week_label: week,
    item_id: itemId,
    item_name: itemName,
    category_name: catName,
    qty: qty,
    min_qty: min,
    updated_at: new Date().toISOString()
  }, { onConflict: 'app_type,week_label,item_id' });
}

// --- RENDERIZADORES DOS APPS ---
function openApp(appName) {
  currentApp = appName;
  document.getElementById('view-hub').classList.remove('active');
  document.getElementById('view-app').classList.add('active');
  
  const titleMap = { cervejas: "Estoque de Cervejas", bebidas: "Estoque de Bebidas", "contador-9": "Contador 9", extra: "Estoque Extra", analytics: "Analytics e Resumos" };
  document.getElementById('current-app-title').innerText = titleMap[appName] || "App";

  if(appName === 'analytics') {
    renderAnalytics();
  } else {
    renderStandardApp(appName);
  }
}

function backToHub() {
  document.getElementById('view-app').classList.remove('active');
  document.getElementById('view-hub').classList.add('active');
}

function renderStandardApp(app) {
  const container = document.getElementById('app-dynamic-content');
  const schema = DATA_SCHEMAS[app] || [];
  
  let html = `
    <div style="margin-bottom:12px; display:flex; gap:8px; overflow-x:auto;">
      ${['Semana 1', 'Semana 2', 'Semana 3', 'Semana 4'].map(w => `
        <button class="btn-back" style="${currentWeek===w ? 'background:var(--amber);color:#000; font-weight:bold;':''}" onclick="changeWeek('${w}')">${w}</button>
      `).join('')}
    </div>
    <input type="text" class="search-input" placeholder="Buscar item..." oninput="filterAppItems(this.value)">
    <div id="app-items-list">
  `;

  schema.forEach(cat => {
    html += `<div class="cat-header">${cat.nome}</div>`;
    cat.itens.forEach(it => {
      if(!localStocks[app]) localStocks[app] = {};
      if(!localStocks[app][currentWeek]) localStocks[app][currentWeek] = {};
      const qty = localStocks[app][currentWeek][it.id] || 0;
      const min = localMinimums[it.id] || 0;
      
      let statusClass = '';
      if(qty === 0) statusClass = 'border-left: 3px solid var(--red);';
      else if(qty < min) statusClass = 'border-left: 3px solid var(--yellow);';
      else if(qty >= min) statusClass = 'border-left: 3px solid var(--green);';

      html += `
        <div class="item-row" style="${statusClass}" data-name="${it.nome.toLowerCase()}">
          <div>
            <div style="font-weight:500; font-size:14px;">${it.nome}</div>
            <div style="font-size:11px; color:var(--text-muted);">Mín: ${min}</div>
          </div>
          <div class="counter-ctrl">
            <button class="btn-adj btn-minus" onclick="adjItem('${app}','${it.id}','${it.nome}','${cat.nome}', -1)">-</button>
            <span class="qty-display" id="display-${it.id}">${qty}</span>
            <button class="btn-adj btn-plus" onclick="adjItem('${app}','${it.id}','${it.nome}','${cat.nome}', 1)">+</button>
          </div>
        </div>
      `;
    });
  });

  html += `</div>`;
  container.innerHTML = html;
}

function changeWeek(w) {
  currentWeek = w;
  renderStandardApp(currentApp);
}

function filterAppItems(val) {
  const query = val.toLowerCase();
  document.querySelectorAll('#app-items-list .item-row').forEach(el => {
    const name = el.getAttribute('data-name');
    el.style.display = name.includes(query) ? 'flex' : 'none';
  });
}

function adjItem(app, id, name, catName, amount) {
  if(!localStocks[app]) localStocks[app] = {};
  if(!localStocks[app][currentWeek]) localStocks[app][currentWeek] = {};
  let currentQty = localStocks[app][currentWeek][id] || 0;
  currentQty = Math.max(0, currentQty + amount);
  
  document.getElementById(`display-${id}`).innerText = currentQty;
  saveItemQty(app, currentWeek, id, name, catName, currentQty);
}

// --- SISTEMA ANALYTICS COMPLETO E CONSOLIDADO ---
function renderAnalytics() {
  const container = document.getElementById('app-dynamic-content');
  
  let totalOk = 0, totalBaixo = 0, totalCrítico = 0;
  let alertHtml = '';

  // Processa dados de todos os apps cruzando com estoque mínimo
  Object.keys(DATA_SCHEMAS).forEach(app => {
    DATA_SCHEMAS[app].forEach(cat => {
      cat.itens.forEach(it => {
        const qty = (localStocks[app] && localStocks[app][currentWeek]) ? (localStocks[app][currentWeek][it.id] || 0) : 0;
        const min = localMinimums[it.id] || 0;

        if(qty === 0) {
          totalCrítico++;
          alertHtml += `<div class="item-row" style="border-left:3px solid var(--red)"><span>[${app.toUpperCase()}] ${it.nome}</span><span style="color:var(--red); font-weight:bold;">ZERA</span></div>`;
        } else if(qty < min) {
          totalBaixo++;
          alertHtml += `<div class="item-row" style="border-left:3px solid var(--yellow)"><span>[${app.toUpperCase()}] ${it.nome}</span><span style="color:var(--yellow); font-weight:bold;">${qty} / ${min}</span></div>`;
        } else {
          totalOk++;
        }
      });
    });
  });

  container.innerHTML = `
    <h3 style="margin-bottom:12px; color:var(--amber);">Resumo Geral de Todos os Estoques (${currentWeek})</h3>
    <div class="status-grid">
      <div class="stat-box"><div class="stat-val ok">${totalOk}</div><div class="stat-lbl">Itens OK</div></div>
      <div class="stat-box"><div class="stat-val low">${totalBaixo}</div><div class="stat-lbl">Abaixo do Mín.</div></div>
      <div class="stat-box"><div class="stat-val crit">${totalCrítico}</div><div class="stat-lbl">Zerados</div></div>
    </div>
    
    <button class="auth-btn" style="background:var(--surface3); color:var(--text); border:1px solid var(--border); margin-bottom:16px;" onclick="generateConsolidatedPDF()">📄 Exportar PDF Consolidado</button>
    
    <h4 class="cat-header">Alertas de Reposição Críticos</h4>
    <div>${alertHtml || '<div style="color:var(--text-muted); font-size:13px;">Nenhum alerta crítico ativo. Todos os estoques estão normais!</div>'}</div>
  `;
}

// GERAÇÃO DE RELATÓRIO PDF COM AUTOTABLE
function generateConsolidatedPDF() {
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    doc.setFillColor(15, 14, 13);
    doc.rect(0, 0, 220, 300, 'F');
    
    doc.setFont("helvetica", "bold");
    doc.setFontSize(22);
    doc.setTextColor(232, 160, 32);
    doc.text("BLACK SKULL BIER", 14, 24);
    
    doc.setFontSize(12);
    doc.setTextColor(150, 150, 150);
    doc.text(`Relatório de Estoque Unificado - ${currentWeek}`, 14, 32);

    let rows = [];
    Object.keys(DATA_SCHEMAS).forEach(app => {
      DATA_SCHEMAS[app].forEach(cat => {
        cat.itens.forEach(it => {
          const qty = (localStocks[app] && localStocks[app][currentWeek]) ? (localStocks[app][currentWeek][it.id] || 0) : 0;
          const min = localMinimums[it.id] || 0;
          let status = qty === 0 ? "ZERADO" : (qty < min ? "BAIXO" : "OK");
          rows.push([app.toUpperCase(), it.nome, cat.nome, qty, min, status]);
        });
      });
    });

    doc.autoTable({
      startY: 40,
      head: [['App Provedor', 'Item', 'Categoria', 'Qtd Atual', 'Qtd Mín', 'Status']],
      body: rows,
      theme: 'grid',
      headStyles: { fillColor: [232, 160, 32], textColor: [0, 0, 0] },
      styles: { fontSize: 10 }
    });

    doc.save(`estoque_consolidado_${currentWeek.replace(/ /g,'_')}.pdf`);
  } catch(e) {
    alert("Erro ao gerar PDF: " + e.message);
  }
}
</script>
</body>
</html>
