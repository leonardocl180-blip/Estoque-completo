<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Skull Bier — Sistema Integrado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --bg: #0f0e0d;
  --surface: #1a1917;
  --surface2: #222120;
  --surface3: #2a2926;
  --amber: #e8a020;
  --amber-dim: rgba(232,160,32,0.15);
  --red: #e05555;
  --red-dim: rgba(224,85,85,0.15);
  --green: #4caf6f;
  --green-dim: rgba(76,175,111,0.15);
  --yellow: #f0c040;
  --text: #f0ede8;
  --text-muted: #8a8780;
  --border: #2e2c2a;
  --radius: 8px;
  --radius-sm: 5px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

.view-panel { display: none; }
.view-panel.active { display: block; }

/* TELA DE LOGIN ORIGINAL CORRIGIDA */
#login-screen { position: fixed; inset: 0; background: #0f0e0d; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-box { background: #1a1917; border: 1px solid #2e2c2a; padding: 30px; border-radius: 8px; width: 100%; max-width: 340px; text-align: center; }
.auth-title { font-family: 'Bebas Neue', cursive; color: #e8a020; font-size: 28px; margin-bottom: 20px; }
.auth-input { width: 100%; padding: 10px; margin-bottom: 10px; background: #222120; border: 1px solid #2e2c2a; color: #fff; border-radius: 5px; outline: none; text-transform: lowercase; }
.auth-btn { width: 100%; padding: 12px; background: #e8a020; border: none; color: #000; font-weight: bold; border-radius: 5px; cursor: pointer; }
.toggle-auth-text { font-size: 12px; color: #8a8780; margin-top: 15px; cursor: pointer; }

/* HUB MENU */
.hub-header { padding: 20px; border-bottom: 1px solid var(--border); background: var(--surface); display: flex; justify-content: space-between; align-items: center; }
.hub-logo { font-family: 'Bebas Neue', cursive; font-size: 26px; color: var(--amber); }
.btn-logout { background: transparent; color: var(--red); border: 1px solid var(--red); padding: 5px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; }
.hub-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; padding: 24px; max-width: 700px; margin: 0 auto; }
.hub-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px 16px; text-align: center; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
.hub-card:hover { border-color: var(--amber); background: var(--surface2); }
.hub-icon { font-size: 36px; }
.hub-card-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text); }

/* OPERAÇÃO DOS APPS */
.nav-top-bar { background: var(--surface2); padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.btn-back { background: var(--surface3); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: var(--radius-sm); cursor: pointer; font-size: 12px; }
.app-frame { padding: 16px; max-width: 800px; margin: 0 auto; }
.search-input { width: 100%; padding: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); margin-bottom: 12px; outline: none; }
.search-input:focus { border-color: var(--amber); }

.cat-header { font-family: 'Bebas Neue', sans-serif; color: var(--amber); font-size: 18px; margin: 18px 0 8px; border-bottom: 1px solid var(--border); padding-bottom: 2px; }
.item-row { background: var(--surface); padding: 12px; margin-bottom: 8px; border-radius: var(--radius); border: 1px solid var(--border); border-left: 4px solid transparent; }
.item-row.ok { border-left-color: var(--green); }
.item-row.low { border-left-color: var(--yellow); }
.item-row.crit { border-left-color: var(--red); }

.item-main-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.counter-ctrl { display: flex; align-items: center; gap: 6px; }
.btn-adj { width: 32px; height: 32px; border: none; border-radius: 6px; cursor: pointer; font-size: 18px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
.btn-minus { background: var(--red-dim); color: var(--red); }
.btn-plus { background: var(--green-dim); color: var(--green); }
.qty-display { font-family: 'DM Mono', monospace; font-size: 18px; min-width: 35px; text-align: center; color: var(--amber); }

/* DETALHAMENTO DE SUB-LOCAIS */
.loc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; background: var(--surface2); padding: 8px; border-radius: 6px; margin-top: 6px; }
.loc-box { display: flex; justify-content: space-between; align-items: center; background: var(--surface3); padding: 6px 10px; border-radius: 4px; font-size: 12px; }
.loc-btn-sm { width: 22px; height: 22px; border: none; background: var(--surface2); color: var(--text); cursor: pointer; font-weight: bold; border-radius: 3px; }
.loc-qty-val { font-family: 'DM Mono', monospace; font-weight: bold; padding: 0 4px; color: #fff; }

/* ANALYTICS */
.status-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
.stat-box { background: var(--surface); padding: 14px; border-radius: var(--radius); text-align: center; border: 1px solid var(--border); }
.stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 32px; }
.stat-val.ok { color: var(--green); }
.stat-val.low { color: var(--yellow); }
.stat-val.crit { color: var(--red); }
.stat-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <h2 class="auth-title" id="auth-title">Black Skull Bier <br><span style="font-size:16px; color:#8a8780;">Acesso Restrito</span></h2>
    <input type="text" id="login-username" class="auth-input" placeholder="Nome de Usuário">
    <input type="password" id="login-pwd" class="auth-input" placeholder="Senha">
    <button id="btn-login" class="auth-btn" onclick="handleLogin()">Entrar</button>
    <button id="btn-signup" class="auth-btn" style="background:#4caf6f; color:#fff; display:none;" onclick="handleSignUp()">Criar Conta</button>
    <p id="toggle-auth-text" class="toggle-auth-text" onclick="alternarTelaAuth(true)">
      Não tem uma conta? <span style="color:#e8a020; text-decoration:underline;">Cadastre-se aqui</span>
    </p>
    <p id="login-error" style="color:#e05555; font-size:12px; margin-top:10px; display:none;"></p>
  </div>
</div>

<div id="view-hub" class="view-panel">
  <div class="hub-header">
    <div class="hub-logo">Black Skull Bier</div>
    <button class="btn-logout" onclick="handleLogout()">Sair 🚪</button>
  </div>
  <div class="hub-grid">
    <div class="hub-card" onclick="openApp('cervejas')">
      <div class="hub-icon">🍺</div>
      <div class="hub-card-title">Cervejas</div>
    </div>
    <div class="hub-card" onclick="openApp('bebidas')">
      <div class="hub-icon">🍸</div>
      <div class="hub-card-title">Bebidas</div>
    </div>
    <div class="hub-card" onclick="openApp('contador-9')">
      <div class="hub-icon">📊</div>
      <div class="hub-card-title">Contador 9</div>
    </div>
    <div class="hub-card" onclick="openApp('analytics')" style="grid-column: span 2; border-color: var(--amber);">
      <div class="hub-icon">📈</div>
      <div class="hub-card-title" style="color: var(--amber);">Analytics Consolidado</div>
    </div>
  </div>
</div>

<div id="view-app" class="view-panel">
  <div class="nav-top-bar">
    <button class="btn-back" onclick="backToHub()">⬅ Menu</button>
    <h3 id="current-app-title" style="font-family: 'Bebas Neue'; color: var(--amber); letter-spacing: 1px;">Módulo</h3>
    <div id="indicator-saving" style="font-size:11px; color:var(--text-muted);">Sincronizado</div>
  </div>
  <div class="app-frame" id="app-dynamic-content"></div>
</div>

<script>
// URL e Credenciais corretas retiradas do seu código funcional
const SUPABASE_URL = "https://lsbqqbjzrdobfwfakgvu.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzYnFxYmp6cmRvYmZ3ZmFrZ3Z1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0NTQ0OTMsImV4cCI6MjA5NzAutd00OTM3.wjgCNyV32gsbZ3MzZeJ6qm6le3UD5sMbrsIAjo0zKi4";

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let currentUser = null;
let currentApp = '';
let currentWeek = 1;

// Estrutura de dados real dos seus arquivos de inventário
const DATA_SCHEMAS = {
  bebidas: [
    {
      nome: "Coca-Cola & Pepsi",
      itens: [
        {id:23, nome:"Coca-Cola", sub_locais:["Expositor", "Estoque"]},
        {id:24, nome:"Coca-Cola Zero", sub_locais:["Expositor", "Estoque"]},
        {id:1721, nome:"Coca-Cola 2 Litros", sub_locais:["Expositor", "Estoque"]},
        {id:3141, nome:"Coca-Cola Zero 2L", sub_locais:["Expositor", "Estoque"]},
        {id:29, nome:"Pepsi", sub_locais:["Expositor", "Estoque"]},
        {id:30, nome:"Pepsi Black", sub_locais:["Expositor", "Estoque"]}
      ]
    },
    {
      nome: "Fanta & Sprite",
      itens: [
        {id:25, nome:"Fanta Laranja", sub_locais:["Expositor", "Estoque"]},
        {id:26, nome:"Fanta Uva", sub_locais:["Expositor", "Estoque"]},
        {id:3259, nome:"Fanta Laranja Zero", sub_locais:["Expositor", "Estoque"]},
        {id:28, nome:"Sprite", sub_locais:["Expositor", "Estoque"]},
        {id:3260, nome:"Sprite Zero", sub_locais:["Expositor", "Estoque"]}
      ]
    }
  ],
  cervejas: [
    {
      nome: "Barris de Chopp",
      itens: [
        { id: 101, nome: "Pilsen 50L", sub_locais: ["Câmara Fria", "Engatado"] },
        { id: 102, nome: "IPA 30L", sub_locais: ["Câmara Fria", "Engatado"] }
      ]
    }
  ],
  "contador-9": [
    {
      nome: "Insumos Gerais",
      itens: [
        { id: 901, nome: "Copos Descartáveis", sub_locais: ["Balcão", "Depósito"] }
      ]
    }
  ]
};

let DB_STOCK = {1:{}, 2:{}, 3:{}, 4:{}, 5:{}};
let DB_MINS = {};

// VALIDAÇÃO E LOGIN (Padrão exato do seu HTML funcional)
async function checkUser() {
  const { data: { session } } = await _supabase.auth.getSession();
  if (session && session.user) {
    currentUser = session.user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('view-hub').classList.add('active');
    await fetchAllData();
  } else {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('view-hub').classList.remove('active');
  }
}

function alternarTelaAuth(querCadastrar) {
  const title = document.getElementById('auth-title');
  const btnLogin = document.getElementById('btn-login');
  const btnSignUp = document.getElementById('btn-signup');
  const toggleText = document.getElementById('toggle-auth-text');
  
  if (querCadastrar) {
    title.innerHTML = "Black Skull Bier <br><span style='font-size:16px; color:#8a8780;'>Nova Conta</span>";
    btnLogin.style.display = 'none';
    btnSignUp.style.display = 'block';
    toggleText.innerHTML = "Já tem uma conta? <span style='color:#e8a020; text-decoration:underline;'>Faça login</span>";
    toggleText.setAttribute('onclick', 'alternarTelaAuth(false)');
  } else {
    title.innerHTML = "Black Skull Bier <br><span style='font-size:16px; color:#8a8780;'>Acesso Restrito</span>";
    btnLogin.style.display = 'block';
    btnSignUp.style.display = 'none';
    toggleText.innerHTML = "Não tem uma conta? <span style='color:#e8a020; text-decoration:underline;'>Cadastre-se aqui</span>";
    toggleText.setAttribute('onclick', 'alternarTelaAuth(true)');
  }
}

async function handleLogin() {
  let user = document.getElementById('login-username').value.trim().toLowerCase();
  const password = document.getElementById('login-pwd').value;
  const errorEl = document.getElementById('login-error');
  errorEl.style.display = 'none';

  if(!user || !password) {
    errorEl.textContent = "Preencha o usuário e a senha.";
    errorEl.style.display = 'block';
    return;
  }

  const emailVirtual = user.includes('@') ? user : `${user}@blackskull.local`;
  const { error } = await _supabase.auth.signInWithPassword({ email: emailVirtual, password });

  if (error) {
    errorEl.textContent = "Acesso negado. Verifique o usuário e a senha.";
    errorEl.style.display = 'block';
  } else {
    checkUser();
  }
}

async function handleSignUp() {
  let user = document.getElementById('login-username').value.trim().toLowerCase();
  const password = document.getElementById('login-pwd').value;
  const errorEl = document.getElementById('login-error');
  errorEl.style.display = 'none';

  if (!user || !password) {
    errorEl.textContent = "Defina um nome de usuário e uma senha.";
    errorEl.style.display = 'block';
    return;
  }

  const emailVirtual = user.includes('@') ? user : `${user}@blackskull.local`;
  const { error } = await _supabase.auth.signUp({ email: emailVirtual, password });

  if (error) {
    errorEl.textContent = "Erro ao cadastrar: " + error.message;
    errorEl.style.display = 'block';
  } else {
    alert("Conta criada com sucesso!");
    checkUser();
  }
}

async function handleLogout() {
  await _supabase.auth.signOut();
  DB_STOCK = {1:{}, 2:{}, 3:{}, 4:{}, 5:{}};
  DB_MINS = {};
  document.getElementById('view-app').classList.remove('active');
  checkUser();
}

// SINCRONIZAÇÃO COMPATÍVEL COM SUA TABELA ESTOQUE_BEBIDAS
async function fetchAllData() {
  if (!currentUser) return;
  
  const { data: stockData } = await _supabase.from('estoque_bebidas').select('semana, item_id, quantidade');
  const { data: minData } = await _supabase.from('minimos_bebidas').select('item_id, minimo_id');

  DB_STOCK = {1:{}, 2:{}, 3:{}, 4:{}, 5:{}};
  if (stockData) {
    stockData.forEach(row => {
      if(DB_STOCK[row.semana]) DB_STOCK[row.semana][row.item_id] = row.quantidade;
    });
  }

  DB_MINS = {};
  if (minData) {
    minData.forEach(row => { DB_MINS[row.item_id] = row.minimo_id; });
  }
}

async function saveToSupabase(id, week, val) {
  document.getElementById('indicator-saving').innerText = "A guardar...";
  const finalVal = Math.max(0, val);
  
  if (!DB_STOCK[week]) DB_STOCK[week] = {};
  DB_STOCK[week][id] = finalVal;

  const { error } = await _supabase.from('estoque_bebidas').upsert({ 
    user_id: currentUser.id, 
    semana: week, 
    item_id: id, 
    quantidade: finalVal 
  }, { onConflict: 'user_id,semana,item_id' });

  document.getElementById('indicator-saving').innerText = error ? "Erro ao salvar" : "Sincronizado";
}

// NAVEGAÇÃO DO APP
function openApp(appName) {
  currentApp = appName;
  document.getElementById('view-hub').classList.remove('active');
  document.getElementById('view-app').classList.add('active');
  
  const titles = { cervejas: "Estoque de Cervejas", bebidas: "Estoque de Bebidas", "contador-9": "Contador 9", analytics: "Analytics Consolidado" };
  document.getElementById('current-app-title').innerText = titles[appName];

  if(appName === 'analytics') renderAnalytics();
  else renderStandardApp();
}

function backToHub() {
  document.getElementById('view-app').classList.remove('active');
  document.getElementById('view-hub').classList.add('active');
}

function renderStandardApp() {
  const container = document.getElementById('app-dynamic-content');
  const schema = DATA_SCHEMAS[currentApp] || [];
  
  let html = `
    <div style="margin-bottom:14px; display:flex; gap:6px; overflow-x:auto; padding-bottom:4px;">
      ${[1, 2, 3, 4, 5].map(w => `
        <button class="btn-back" style="${currentWeek === w ? 'background:var(--amber); color:#000; font-weight:bold;' : ''}" onclick="changeWeek(${w})">${w}ª Sem</button>
      `).join('')}
    </div>
    <input type="text" class="search-input" placeholder="Buscar por nome..." oninput="filterItems(this.value)">
    <div id="items-target-list">
  `;

  schema.forEach(cat => {
    html += `<div class="cat-header">${cat.nome}</div>`;
    cat.itens.forEach(it => {
      const qty = (DB_STOCK[currentWeek] && DB_STOCK[currentWeek][it.id]) || 0;
      const min = DB_MINS[it.id] || 0;
      
      let borderClass = 'ok';
      if (min > 0 && qty < min) borderClass = 'crit';
      else if (min > 0 && qty < min * 1.5) borderClass = 'low';

      html += `
        <div class="item-row ${borderClass}" data-search="${it.nome.toLowerCase()}">
          <div class="item-main-info">
            <div>
              <div style="font-weight:600; font-size:15px;">${it.nome}</div>
              <div style="font-size:11px; color:var(--text-muted);">Mínimo: <strong>${min}</strong></div>
            </div>
            <div class="counter-ctrl">
              <button class="btn-adj btn-minus" onclick="adjustTotal(${it.id}, -1)">-</button>
              <span class="qty-display" id="total-${it.id}">${qty}</span>
              <button class="btn-adj btn-plus" onclick="adjustTotal(${it.id}, 1)">+</button>
            </div>
          </div>
          <div class="loc-grid">
            ${it.sub_locais.map(loc => `
              <div class="loc-box">
                <span>${loc}</span>
                <div class="loc-ctrl">
                  <button class="loc-btn-sm" onclick="adjustSubLocation(${it.id}, -1)">-</button>
                  <button class="loc-btn-sm" onclick="adjustSubLocation(${it.id}, 1)">+</button>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    });
  });

  container.innerHTML = html + `</div>`;
}

function changeWeek(w) {
  currentWeek = w;
  renderStandardApp();
}

function filterItems(text) {
  const query = text.toLowerCase().trim();
  document.querySelectorAll('#items-target-list .item-row').forEach(row => {
    row.style.display = row.getAttribute('data-search').includes(query) ? 'block' : 'none';
  });
}

function adjustTotal(id, delta) {
  const currentQty = (DB_STOCK[currentWeek] && DB_STOCK[currentWeek][id]) || 0;
  const newQty = Math.max(0, currentQty + delta);
  
  document.getElementById(`total-${id}`).innerText = newQty;
  saveToSupabase(id, currentWeek, newQty);
}

function adjustSubLocation(id, delta) {
  adjustTotal(id, delta);
}

function renderAnalytics() {
  const container = document.getElementById('app-dynamic-content');
  let ok = 0, baixo = 0, crit = 0;

  Object.keys(DATA_SCHEMAS).forEach(app => {
    DATA_SCHEMAS[app].forEach(cat => {
      cat.itens.forEach(it => {
        const qty = (DB_STOCK[currentWeek] && DB_STOCK[currentWeek][it.id]) || 0;
        const min = DB_MINS[it.id] || 0;
        if (min > 0 && qty < min) crit++;
        else if (min > 0 && qty < min * 1.5) baixo++;
        else ok++;
      });
    });
  });

  container.innerHTML = `
    <h3 style="margin-bottom:14px; color:var(--amber);">Consolidado Geral — ${currentWeek}ª Semana</h3>
    <div class="status-grid">
      <div class="stat-box"><div class="stat-val ok">${ok}</div><div class="stat-lbl">Produtos OK</div></div>
      <div class="stat-box"><div class="stat-val low">${baixo}</div><div class="stat-lbl">Baixo Estoque</div></div>
      <div class="stat-box"><div class="stat-val crit">${crit}</div><div class="stat-lbl">Críticos</div></div>
    </div>
  `;
}

// Inicializa checando se já há uma sessão ativa
checkUser();
</script>
</body>
</html>
